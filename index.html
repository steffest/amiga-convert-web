<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amiga 12-bit Color Preview</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="main-layout">
        <div class="controls">
          <div class="control-group">
            <h3>Conversion</h3>
            <div class="control-item">
              <label>Colors</label>
              <div class="slider-with-input">
                <input
                  type="range"
                  id="colors"
                  min="2"
                  max="256"
                  value="32"
                  step="1"
                />
                <input
                  type="number"
                  id="colorsNumber"
                  min="2"
                  max="256"
                  value="32"
                  step="1"
                />
              </div>
            </div>
            <div class="control-item">
              <label for="quantMethod">Quantization</label>
              <select id="quantMethod">
                <option value="rgbquant" selected>RGB Quant (best)</option>
                <option value="wuquant">Wu Quant (fast)</option>
                <option value="neuquant">Neu Quant (slow)</option>
                <option value="median-cut">Median Cut</option>
              </select>
            </div>
            <div class="control-item">
              <label for="colorDistance">Color Distance</label>
              <select id="colorDistance">
                <option value="rgb-euclidean" selected>
                  RGB Euclidean (fast)
                </option>
                <option value="weighted-rgb">Weighted RGB (fast)</option>
                <option value="redmean">Redmean (perceptual)</option>
                <option value="cie76-lab">CIE76 LAB (accurate)</option>
              </select>
            </div>
            <div class="control-item">
              <label for="ditherMethod">Dithering</label>
              <select id="ditherMethod">
                <option value="floyd-steinberg" selected>
                  Floyd-Steinberg
                </option>
                <option value="jarvis-judice-ninke">Jarvis-Judice-Ninke</option>
                <option value="stucki">Stucki</option>
                <option value="burkes">Burkes</option>
                <option value="sierra">Sierra</option>
                <option value="sierra-lite">Sierra Lite</option>
                <option value="atkinson">Atkinson</option>
                <option value="ordered">Ordered (Bayer)</option>
                <option value="none">None</option>
              </select>
            </div>
            <div
              class="control-item"
              id="bayerSizeControl"
              style="display: none"
            >
              <label for="bayerSize">Bayer Matrix Size</label>
              <select id="bayerSize">
                <option value="2">2x2</option>
                <option value="4">4x4</option>
                <option value="8" selected>8x8</option>
              </select>
            </div>
            <div class="control-item" id="ditherAmountControl">
              <label>Dither Amount</label>
              <div class="slider-with-input">
                <input
                  type="range"
                  id="ditherAmount"
                  min="0"
                  max="1"
                  value="0.5"
                  step="0.01"
                />
                <input
                  type="number"
                  id="ditherAmountNumber"
                  min="0"
                  max="1"
                  value="0.5"
                  step="0.05"
                />
              </div>
            </div>
          </div>

          <div class="control-group">
            <h3>Resize</h3>
            <div class="control-group-content">
              <div class="control-item">
                <div class="resize-inputs">
                  <input
                    type="number"
                    id="resizeWidth"
                    min="1"
                    max="4096"
                    value="320"
                    placeholder="Width"
                  />
                  <span class="resize-separator">×</span>
                  <input
                    type="number"
                    id="resizeHeight"
                    min="1"
                    max="4096"
                    value="256"
                    placeholder="Height"
                  />
                </div>
              </div>
              <div class="control-item">
                <label>
                  <input type="checkbox" id="aspectRatioLock" checked />
                  Lock Aspect Ratio
                </label>
              </div>
            </div>
          </div>

          <div class="control-group">
            <h3>Curves</h3>
            <div class="control-group-content">
              <div class="curves-inline">
                <div class="curves-channel-selector">
                  <button
                    class="curves-channel-btn rgb active"
                    data-channel="rgb"
                  >
                    RGB
                  </button>
                  <button class="curves-channel-btn red" data-channel="red">
                    R
                  </button>
                  <button class="curves-channel-btn green" data-channel="green">
                    G
                  </button>
                  <button class="curves-channel-btn blue" data-channel="blue">
                    B
                  </button>
                </div>
                <div class="curves-canvas-wrapper">
                  <canvas
                    id="curvesCanvas"
                    class="curves-canvas"
                    width="256"
                    height="256"
                  ></canvas>
                </div>
                <button class="curves-reset" id="curvesReset">
                  Reset Curve
                </button>
              </div>
            </div>
          </div>

          <div class="control-group">
            <h3>Adjustments</h3>
            <div class="control-group-content">
              <button
                class="curves-reset"
                id="resetAllBtn"
                style="margin-bottom: 12px"
              >
                Reset All Adjustments
              </button>
              <div class="control-item">
                <label>Contrast</label>
                <div class="slider-with-input">
                  <input
                    type="range"
                    id="contrast"
                    min="-100"
                    max="100"
                    value="0"
                    step="1"
                  />
                  <input
                    type="number"
                    id="contrastNumber"
                    min="-100"
                    max="100"
                    value="0"
                    step="1"
                  />
                </div>
              </div>
              <div class="control-item">
                <label>Hue</label>
                <div class="slider-with-input">
                  <input
                    type="range"
                    id="hue"
                    min="-180"
                    max="180"
                    value="0"
                    step="1"
                  />
                  <input
                    type="number"
                    id="hueNumber"
                    min="-180"
                    max="180"
                    value="0"
                    step="1"
                  />
                </div>
              </div>
              <div class="control-item">
                <label>Saturation</label>
                <div class="slider-with-input">
                  <input
                    type="range"
                    id="saturation"
                    min="-100"
                    max="100"
                    value="0"
                    step="1"
                  />
                  <input
                    type="number"
                    id="saturationNumber"
                    min="-100"
                    max="100"
                    value="0"
                    step="1"
                  />
                </div>
              </div>
              <div class="control-item">
                <label>Brightness</label>
                <div class="slider-with-input">
                  <input
                    type="range"
                    id="brightness"
                    min="-100"
                    max="100"
                    value="0"
                    step="1"
                  />
                  <input
                    type="number"
                    id="brightnessNumber"
                    min="-100"
                    max="100"
                    value="0"
                    step="1"
                  />
                </div>
              </div>
              <div class="control-item">
                <label>Gamma</label>
                <div class="slider-with-input">
                  <input
                    type="range"
                    id="gamma"
                    min="0.2"
                    max="3"
                    value="1"
                    step="0.05"
                  />
                  <input
                    type="number"
                    id="gammaNumber"
                    min="0.2"
                    max="3"
                    value="1"
                    step="0.05"
                  />
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="canvas-container">
          <div class="preview-controls">
            <div class="preview-controls-left">
              <div>
                <label for="viewMode">View:</label>
                <select id="viewMode">
                  <option value="side-by-side">Side by Side</option>
                  <option value="stacked">Stacked</option>
                  <option value="original-only">Original Only</option>
                  <option value="preview-only">Preview Only</option>
                  <option value="slide-reveal">Slide Reveal</option>
                </select>
              </div>

              <div>
                <label for="zoomLevel">Zoom:</label>
                <select id="zoomLevel">
                  <option value="fit">Fit</option>
                  <option value="1">100%</option>
                  <option value="2">200%</option>
                  <option value="4">400%</option>
                </select>
              </div>
            </div>

            <div class="preview-controls-right">
              <button id="chooseImageBtn">Choose Image</button>
              <button
                id="changeImageBtn"
                class="secondary-btn"
                style="display: none"
              >
                Change Image
              </button>
              <button id="downloadBtn" disabled>Download Result</button>
            </div>
          </div>

          <div class="canvas-display" id="canvasDisplay">
            <input
              type="file"
              id="imageInput"
              accept="image/*"
              style="display: none"
            />
            <div class="drop-message" id="dropMessage">
              Drop an image here or click to choose
            </div>

            <div
              class="canvas-grid side-by-side"
              id="canvasGrid"
              style="display: none"
            >
              <div class="canvas-wrapper" id="originalWrapper">
                <h3>Original</h3>
                <div class="canvas-scroll">
                  <canvas id="originalCanvas"></canvas>
                </div>
              </div>
              <div class="canvas-wrapper" id="previewWrapper">
                <h3>Amiga 12-bit Preview</h3>
                <div class="canvas-scroll">
                  <canvas id="previewCanvas"></canvas>
                </div>
              </div>
            </div>

            <div
              class="slide-reveal-container"
              id="slideRevealContainer"
              style="display: none"
            >
              <div class="slide-reveal-wrapper" id="slideRevealWrapper">
                <canvas
                  id="slidePreviewCanvas"
                  class="slide-canvas-bottom"
                ></canvas>
                <canvas
                  id="slideOriginalCanvas"
                  class="slide-canvas-top"
                ></canvas>
                <div class="slide-divider" id="slideDivider"></div>
              </div>
            </div>
          </div>

          <div class="palette-display" id="paletteDisplay"></div>
          <div class="palette-actions hidden" id="paletteActions">
            <button id="addColorBtn">Add Color</button>
            <button id="loadPaletteBtn">Load Palette</button>
            <button id="lockAllBtn">Lock All</button>
            <button id="clearLocksBtn">Clear Locks</button>
          </div>
          <input
            type="file"
            id="paletteInput"
            accept="image/png"
            style="display: none"
          />
        </div>
      </div>
    </div>

    <div class="add-color-modal" id="addColorModal">
      <div class="add-color-content">
        <h3>Add Custom Color</h3>
        <label for="customColorInput"
          >12-bit Hex Color (e.g., #F03 or #FF0033)</label
        >
        <input type="text" id="customColorInput" placeholder="#F03" />
        <div class="button-group">
          <button id="cancelAddColor">Cancel</button>
          <button id="confirmAddColor">Add</button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
