<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta
      name="description"
      content="Convert images to Amiga 12-bit color palette with dithering"
    />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <title>Amiga Image Converter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="main-layout">
        <div class="controls">
          <div class="control-group">
            <h3>Conversion</h3>
            <div class="control-group-content">
              <div class="control-group-content-inner">
                <div class="control-item">
                  <label>Colors</label>
                  <div class="slider-with-input">
                    <input
                      type="range"
                      id="colors"
                      min="2"
                      max="256"
                      value="32"
                      step="1"
                    />
                    <input
                      type="number"
                      id="colorsNumber"
                      min="2"
                      max="256"
                      value="32"
                      step="1"
                    />
                  </div>
                </div>
                <div class="control-item">
                  <label for="bitDepth">Color Depth</label>
                  <select id="bitDepth">
                    <option value="12">12-bit (Amiga OCS/ECS)</option>
                    <option value="9">9-bit (Atari ST)</option>
                    <option value="24">24-bit (AGA/Modern)</option>
                  </select>
                </div>
                <div class="control-item">
                  <label for="quantMethod">Quantization</label>
                  <select id="quantMethod">
                    <option value="rgbquant" selected>RGB Quant</option>
                    <option value="wuquant">Wu Quant</option>
                    <option value="neuquant">Neu Quant</option>
                    <option value="median-cut">Median Cut</option>
                  </select>
                </div>
                <div class="control-item">
                  <label for="colorDistance">Color Distance</label>
                  <select id="colorDistance">
                    <option value="rgb-euclidean" selected>
                      RGB Euclidean
                    </option>
                    <option value="weighted-rgb">Weighted RGB</option>
                    <option value="redmean">Redmean</option>
                    <option value="cie76-lab">CIE76 LAB</option>
                  </select>
                </div>
                <div class="control-item">
                  <label for="ditherMethod">Dithering</label>
                  <select id="ditherMethod">
                    <option value="floyd-steinberg" selected>
                      Floyd-Steinberg
                    </option>
                    <option value="jarvis-judice-ninke">
                      Jarvis-Judice-Ninke
                    </option>
                    <option value="stucki">Stucki</option>
                    <option value="burkes">Burkes</option>
                    <option value="sierra">Sierra</option>
                    <option value="sierra-lite">Sierra Lite</option>
                    <option value="atkinson">Atkinson</option>
                    <option value="ordered">Ordered (Bayer)</option>
                    <option value="none">None</option>
                  </select>
                </div>
                <div
                  class="control-item"
                  id="bayerSizeControl"
                  style="display: none"
                >
                  <label for="bayerSize">Bayer Matrix Size</label>
                  <select id="bayerSize">
                    <option value="2">2x2</option>
                    <option value="4">4x4</option>
                    <option value="8" selected>8x8</option>
                  </select>
                </div>
                <div class="control-item" id="ditherAmountControl">
                  <label>Dither Amount</label>
                  <div class="slider-with-input">
                    <input
                      type="range"
                      id="ditherAmount"
                      min="0"
                      max="1"
                      value="0.5"
                      step="0.01"
                    />
                    <input
                      type="number"
                      id="ditherAmountNumber"
                      min="0"
                      max="1"
                      value="0.5"
                      step="0.05"
                    />
                  </div>
                </div>
                <div class="control-item" id="errorDampeningControl">
                  <label>
                    <input type="checkbox" id="errorDampeningEnabled" />
                    Error Dampening
                  </label>
                  <div class="slider-with-input">
                    <input
                      type="range"
                      id="errorDampeningThreshold"
                      min="1"
                      max="400"
                      value="48"
                      step="1"
                    />
                    <input
                      type="number"
                      id="errorDampeningThresholdNumber"
                      min="1"
                      max="400"
                      value="48"
                      step="1"
                    />
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="control-group">
            <h3>Curves</h3>
            <div class="control-group-content">
              <div class="control-group-content-inner">
                <div class="curves-inline">
                  <div class="curves-channel-selector">
                    <button
                      class="curves-channel-btn rgb active"
                      data-channel="rgb"
                    >
                      RGB
                    </button>
                    <button class="curves-channel-btn red" data-channel="red">
                      R
                    </button>
                    <button
                      class="curves-channel-btn green"
                      data-channel="green"
                    >
                      G
                    </button>
                    <button class="curves-channel-btn blue" data-channel="blue">
                      B
                    </button>
                  </div>
                  <div class="curves-canvas-wrapper">
                    <canvas
                      id="curvesCanvas"
                      class="curves-canvas"
                      width="256"
                      height="256"
                    ></canvas>
                  </div>
                  <button class="curves-reset" id="curvesReset">
                    Reset Curve
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div class="control-group">
            <h3>Adjustments</h3>
            <div class="control-group-content">
              <div class="control-group-content-inner">
                <div class="control-item">
                  <label>Contrast</label>
                  <div class="slider-with-input">
                    <input
                      type="range"
                      id="contrast"
                      min="-100"
                      max="100"
                      value="0"
                      step="1"
                    />
                    <input
                      type="number"
                      id="contrastNumber"
                      min="-100"
                      max="100"
                      value="0"
                      step="1"
                    />
                  </div>
                </div>
                <div class="control-item">
                  <label>Hue</label>
                  <div class="slider-with-input">
                    <input
                      type="range"
                      id="hue"
                      min="-180"
                      max="180"
                      value="0"
                      step="1"
                    />
                    <input
                      type="number"
                      id="hueNumber"
                      min="-180"
                      max="180"
                      value="0"
                      step="1"
                    />
                  </div>
                </div>
                <div class="control-item">
                  <label>Saturation</label>
                  <div class="slider-with-input">
                    <input
                      type="range"
                      id="saturation"
                      min="-100"
                      max="100"
                      value="0"
                      step="1"
                    />
                    <input
                      type="number"
                      id="saturationNumber"
                      min="-100"
                      max="100"
                      value="0"
                      step="1"
                    />
                  </div>
                </div>
                <div class="control-item">
                  <label>Brightness</label>
                  <div class="slider-with-input">
                    <input
                      type="range"
                      id="brightness"
                      min="-100"
                      max="100"
                      value="0"
                      step="1"
                    />
                    <input
                      type="number"
                      id="brightnessNumber"
                      min="-100"
                      max="100"
                      value="0"
                      step="1"
                    />
                  </div>
                </div>
                <div class="control-item">
                  <label>Gamma</label>
                  <div class="slider-with-input">
                    <input
                      type="range"
                      id="gamma"
                      min="0.2"
                      max="3"
                      value="1"
                      step="0.05"
                    />
                    <input
                      type="number"
                      id="gammaNumber"
                      min="0.2"
                      max="3"
                      value="1"
                      step="0.05"
                    />
                  </div>
                </div>
                <button class="curves-reset" id="resetAllBtn">
                  Reset All Adjustments
                </button>
              </div>
            </div>
          </div>

          <div class="control-group">
            <h3>Resize</h3>
            <div class="control-group-content">
              <div class="control-group-content-inner">
                <div class="control-item">
                  <div class="resize-inputs">
                    <input
                      type="number"
                      id="resizeWidth"
                      min="1"
                      max="4096"
                      value="320"
                      placeholder="Width"
                    />
                    <span class="resize-separator">×</span>
                    <input
                      type="number"
                      id="resizeHeight"
                      min="1"
                      max="4096"
                      value="256"
                      placeholder="Height"
                    />
                  </div>
                </div>
                <div class="control-item">
                  <label>
                    <input type="checkbox" id="aspectRatioLock" checked />
                    Lock Aspect Ratio
                  </label>
                </div>
              </div>
            </div>
          </div>

          <div class="preset-buttons">
            <button id="loadSettingsBtn">Load Settings</button>
            <button id="saveSettingsBtn">Save Settings</button>
          </div>
          <input
            type="file"
            id="settingsInput"
            accept="application/json,.json"
            style="display: none"
          />
        </div>

        <div class="canvas-container">
          <div class="preview-controls">
            <div class="preview-controls-left">
              <div>
                <label for="viewMode">View:</label>
                <select id="viewMode">
                  <option value="side-by-side">Side by Side</option>
                  <option value="stacked">Stacked</option>
                  <option value="original-only">Original Only</option>
                  <option value="preview-only">Preview Only</option>
                  <option value="slide-reveal">Slide Reveal</option>
                </select>
              </div>

              <div>
                <label for="zoomLevel">Zoom:</label>
                <select id="zoomLevel">
                  <option value="fit">Fit</option>
                  <option value="1">100%</option>
                  <option value="2">200%</option>
                  <option value="4">400%</option>
                </select>
              </div>
            </div>

            <div class="preview-controls-right">
              <button id="chooseImageBtn">Choose Image</button>
              <button
                id="changeImageBtn"
                class="secondary-btn"
                style="display: none"
              >
                Change Image
              </button>
              <button id="downloadBtn" disabled>Save Result</button>
            </div>
          </div>

          <div class="canvas-display" id="canvasDisplay">
            <input
              type="file"
              id="imageInput"
              accept="image/*"
              style="display: none"
            />
            <div class="drop-message" id="dropMessage">
              Drop an image here or click to choose
            </div>

            <div
              class="canvas-grid side-by-side"
              id="canvasGrid"
              style="display: none"
            >
              <div class="canvas-wrapper" id="originalWrapper">
                <h3>Original</h3>
                <div class="canvas-scroll">
                  <canvas id="originalCanvas"></canvas>
                </div>
              </div>
              <div class="canvas-wrapper" id="previewWrapper">
                <h3>Amiga 12-bit Preview</h3>
                <div class="canvas-scroll">
                  <canvas id="previewCanvas"></canvas>
                </div>
              </div>
            </div>

            <div
              class="slide-reveal-container"
              id="slideRevealContainer"
              style="display: none"
            >
              <div class="slide-reveal-wrapper" id="slideRevealWrapper">
                <canvas
                  id="slidePreviewCanvas"
                  class="slide-canvas-bottom"
                ></canvas>
                <canvas
                  id="slideOriginalCanvas"
                  class="slide-canvas-top"
                ></canvas>
                <div class="slide-divider" id="slideDivider"></div>
              </div>
            </div>
          </div>

          <div class="palette hidden" id="paletteActions">
            <div class="palette-display" id="paletteDisplay"></div>
            <div class="palette-actions">
              <button id="addColorBtn">Add Color</button>
              <button id="loadPaletteBtn">Load Palette</button>
              <button id="lockAllBtn">Lock All</button>
              <button id="clearLocksBtn">Clear Locks</button>
              <div class="alpha-controls">
                <label for="alphaMode" style="margin: 0">Alpha:</label>
                <select id="alphaMode" style="width: auto">
                  <option value="matte">Matte</option>
                  <option value="threshold">Threshold</option>
                </select>
                <div class="alpha-matte-options" id="alphaModeMatteOptions">
                  <button
                    type="button"
                    class="color-swatch-btn"
                    id="matteColorBtn"
                    style="background: #fff"
                    title="Click to open color picker"
                  ></button>
                  <input
                    type="text"
                    id="matteColorInput"
                    value="#FFF"
                    placeholder="#FFF"
                    style="width: 70px"
                    title="Background color for semi-transparent pixels"
                  />
                </div>
                <div
                  class="alpha-threshold-options"
                  id="alphaModeThresholdOptions"
                  style="display: none"
                >
                  <input
                    type="range"
                    id="alphaThreshold"
                    min="1"
                    max="255"
                    value="128"
                    title="Pixels below this alpha value become transparent"
                  />
                  <input
                    type="number"
                    id="alphaThresholdNumber"
                    min="1"
                    max="255"
                    value="128"
                    style="width: 70px"
                  />
                </div>
              </div>
            </div>
            <input
              type="file"
              id="paletteInput"
              accept="image/png"
              style="display: none"
            />
          </div>
        </div>
      </div>
    </div>

    <div class="add-color-modal" id="addColorModal">
      <div class="add-color-content">
        <h3>Add Custom Color</h3>
        <div class="color-picker" id="addColorPicker">
          <div class="color-picker-main">
            <div class="picker-square-wrap">
              <canvas class="picker-square" width="256" height="256"></canvas>
              <div class="picker-square-cursor"></div>
            </div>
            <div class="picker-hue-wrap">
              <canvas class="picker-hue" width="20" height="256"></canvas>
              <div class="picker-hue-cursor"></div>
            </div>
          </div>
          <div class="color-picker-swatches"></div>
          <div class="color-picker-input">
            <div class="color-picker-preview"></div>
            <input type="text" class="color-picker-hex" placeholder="#F03" />
          </div>
        </div>
        <div class="button-group">
          <button id="cancelAddColor">Cancel</button>
          <button id="confirmAddColor">Add</button>
        </div>
      </div>
    </div>

    <div class="add-color-modal" id="matteColorModal">
      <div class="add-color-content">
        <h3>Matte Color</h3>
        <div class="color-picker" id="mattePickerInner">
          <div class="color-picker-main">
            <div class="picker-square-wrap">
              <canvas class="picker-square" width="256" height="256"></canvas>
              <div class="picker-square-cursor"></div>
            </div>
            <div class="picker-hue-wrap">
              <canvas class="picker-hue" width="20" height="256"></canvas>
              <div class="picker-hue-cursor"></div>
            </div>
          </div>
          <div class="color-picker-swatches"></div>
          <div class="color-picker-input">
            <div class="color-picker-preview"></div>
            <input type="text" class="color-picker-hex" placeholder="#FFF" />
          </div>
        </div>
        <div class="button-group">
          <button id="matteColorClose">Done</button>
        </div>
      </div>
    </div>

    <script type="module" src="app.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/sw.js");
      }
    </script>
  </body>
</html>
